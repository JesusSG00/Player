<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Player</title>

    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <div class="player">

        <!-- Barra superior -->
        <header class="topbar">
            <h1>🎵 Music Player</h1>

            <input
                type="text"
                id="search"
                placeholder="Buscar canción...">
        </header>

        <!-- Contenido -->
        <main class="content">

            <!-- Lista -->
            <aside class="playlist">

                <h2>Biblioteca</h2>

                <ul id="songList">

                    <!-- Aquí JavaScript agregará las canciones -->

                </ul>

            </aside>

            <!-- Reproductor -->
            <section class="playerArea">

                <img
                    id="cover"
                    src="assets/default-cover.png"
                    alt="Portada">

                <h2 id="songTitle">Selecciona una canción</h2>

                <h3 id="artistName">Artista</h3>

                <audio id="audio"></audio>

                <!-- Barra -->
                <div class="progressContainer">

                    <span id="currentTime">
                        0:00
                    </span>

                    <input
                        type="range"
                        id="progress"
                        value="0"
                        min="0"
                        max="100">

                    <span id="duration">
                        0:00
                    </span>

                </div>

                <!-- Controles -->
                <div class="controls">

                    <button id="prev">
                        ⏮
                    </button>

                    <button id="play">
                        ▶
                    </button>

                    <button id="next">
                        ⏭
                    </button>

                </div>

                <!-- Volumen -->
                <div class="volume">

                    🔊

                    <input
                        type="range"
                        id="volume"
                        min="0"
                        max="100"
                        value="100">

                </div>

            </section>

        </main>

    </div>

    <script src="js/playlist.js"></script>
    <script src="js/player.js"></script>

</body>

</html>
